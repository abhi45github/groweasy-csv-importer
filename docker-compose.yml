# ─────────────────────────────────────────────────────────────
#  GrowEasy CSV Importer — local full-stack via Docker Compose
#
#  Usage:
#    1. Copy .env.example to .env and add an LLM API key (optional —
#       without one the app runs in deterministic heuristic mode).
#    2. docker compose up --build
#    3. Open http://localhost:3000
# ─────────────────────────────────────────────────────────────
services:
  backend:
    build:
      context: ./backend
    image: groweasy-importer-backend
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: '4000'
      CORS_ORIGIN: http://localhost:3000
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-latest}
      AI_BATCH_SIZE: ${AI_BATCH_SIZE:-25}
      AI_CONCURRENCY: ${AI_CONCURRENCY:-3}
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle — must be reachable from the BROWSER.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    image: groweasy-importer-frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped
