# Render Blueprint — one-click backend deploy.
# In Render: New +  ->  Blueprint  ->  connect this repo  ->  it reads this file.
# You'll be asked to paste GEMINI_API_KEY (kept secret, not in the repo).
services:
  - type: web
    name: groweasy-importer-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CORS_ORIGIN
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
